version: '3.8'

# 本地 HTTPS 测试配置
# 使用自签名 SSL 证书

services:
  mysql:
    image: mysql:8.0
    container_name: leadmine_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-leadmine_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-leadmine}
      MYSQL_USER: ${MYSQL_USER:-leadmine}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-leadmine123}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - leadmine
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: leadmine_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-leadmine123}
    networks:
      - leadmine
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadmine_backend
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-leadmine}:${MYSQL_PASSWORD:-leadmine123}@mysql:3306/${MYSQL_DATABASE:-leadmine}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-leadmine123}@redis:6379
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - DEBUG=false
      - LOG_LEVEL=INFO
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - leadmine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: leadmine_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - leadmine
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  leadmine:
    name: leadmine_network
